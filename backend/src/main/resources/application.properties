spring.application.name=backend

# Local defaults for development. Override with environment variables in deployment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartcampus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
app.jwt.secret=${APP_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_MINUTES:60}
app.jwt.refresh-token-minutes=${APP_JWT_REFRESH_MINUTES:10080}

# Email verification OTP settings
app.auth.email-verification.otp-minutes=${APP_AUTH_OTP_MINUTES:10}
app.auth.email-verification.max-attempts=${APP_AUTH_OTP_MAX_ATTEMPTS:5}
app.auth.email-verification.resend-cooldown-seconds=${APP_AUTH_OTP_RESEND_COOLDOWN_SECONDS:60}
app.auth.email-verification.from=${MAIL_FROM:no-reply@smartcampus.local}
app.auth.email-verification.require-email-send=${APP_AUTH_REQUIRE_EMAIL_SEND:false}

# Forgot password OTP settings
app.auth.forgot-password.otp-minutes=${APP_AUTH_FORGOT_PASSWORD_OTP_MINUTES:10}
app.auth.forgot-password.max-attempts=${APP_AUTH_FORGOT_PASSWORD_OTP_MAX_ATTEMPTS:5}
app.auth.forgot-password.resend-cooldown-seconds=${APP_AUTH_FORGOT_PASSWORD_OTP_RESEND_COOLDOWN_SECONDS:60}

# SMTP settings (optional in local dev)
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

# Google OAuth2 (set env variables to enable)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
app.oauth2.success-redirect-uri=${FRONTEND_OAUTH_SUCCESS_URL:http://localhost:5173/oauth/callback}
app.oauth2.failure-redirect-uri=${FRONTEND_OAUTH_FAILURE_URL:http://localhost:5173/signin?oauth=failed}

# Optional local database console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
