spring.application.name=backend

# Local defaults for development. Override with environment variables in deployment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartcampus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
app.jwt.secret=${APP_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_MINUTES:60}
app.jwt.refresh-token-minutes=${APP_JWT_REFRESH_MINUTES:10080}

# Google OAuth2 (set env variables to enable)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Optional local database console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
